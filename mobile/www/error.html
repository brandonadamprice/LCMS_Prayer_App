<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Simple Way to Pray</title>
  <style>
    body {
      margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #f7f3e3; color: #4a3b2f; font-family: Georgia, 'Times New Roman', serif;
      text-align: center; padding: 24px; box-sizing: border-box;
    }
    .cross { color: #65342f; font-size: 40px; margin-bottom: 14px; }
    h1 { font-weight: normal; font-size: 26px; margin: 0 0 10px; color: #65342f; }
    p { font-size: 17px; line-height: 1.5; margin: 0 0 24px; }
    button {
      background: #65342f; color: #f7f3e3; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 17px; font-family: inherit;
    }
  </style>
</head>
<body>
  <div>
    <div class="cross">&#10013;</div>
    <h1>You appear to be offline</h1>
    <p>A Simple Way to Pray needs an internet connection<br>for its first load on this device.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
